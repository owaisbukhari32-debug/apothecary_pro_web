function tokens(name) {
  return name.toLowerCase().replace(/[()]/g, " ").split(/[\s\-,/]+/).filter((w) => w.length > 2);
}
function keyFor(name) { return name.trim().toLowerCase().split(/[\s(]/)[0]; }

async function askClaude(userPrompt, systemPrompt) {
  if (!ANTHROPIC_API_KEY) throw new Error("NO_KEY");
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": ANTHROPIC_API_KEY,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: systemPrompt, messages: [{ role: "user", content: userPrompt }] }),
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error.message || "API error");
  return data.content.map((i) => (i.type === "text" ? i.text : "")).filter(Boolean).join("\n");
}

function DDIModule({ onBack }) {

        <span style={{ background: "#16a34a", color: "#fff", width: 20, height: 20, borderRadius: "50%", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 11 }}>{i + 1}</span>{d}
        <button onClick={() => remove(d)} style={{ border: "none", background: "#fee2e2", color: "#b91c1c", width: 22, height: 22, borderRadius: "50%", cursor: "pointer", fontWeight: 800, fontSize: 12 }}>✕</button>
      </span>)}
    </div>}
    <label style={styles.label}>Medicine name</label>
    <div style={{ display: "flex", gap: 10, position: "relative", marginBottom: 6 }}>
      <div style={{ flex: 1, position: "relative" }}>
        <input value={text} placeholder="Start typing — e.g., warfarin" onChange={(e) => { setText(e.target.value); setOpen(true); }} onFocus={() => setOpen(true)} onBlur={() => setTimeout(() => setOpen(false), 150)} onKeyDown={(e) => e.key === "Enter" && add()} style={styles.input} />
        {open && <SuggestList matches={matches} onPick={add} />}

    </div>
    <div style={{ fontSize: 12, color: "#9ca3af", marginBottom: 16 }}>{drugs.length < 2 ? "Add at least 2 medicines." : `${drugs.length} added — ${pairs} pair${pairs > 1 ? "s" : ""} to analyze.`}</div>
    <button style={{ ...styles.btn, opacity: drugs.length >= 2 ? 1 : 0.45 }} onClick={check} disabled={drugs.length < 2}>🔍 Check Interactions</button>
    {loading && <Spinner />}
    {result && <div style={styles.resultBox}>
      {result.map((f, i) => <div key={i} style={{ marginBottom: 16, paddingBottom: 12, borderBottom: i < result.length - 1 ? "1px solid #dcfce7" : "none" }}>

    adr: { db: ADR_DB, title: "Adverse Effects", ph: "e.g., amiodarone", aiPrompt: (d) => `Adverse effect profile of ${d}: boxed warnings (prefix '!!'), serious effects, common effects, monitoring, then References.` },

    {searched && result && kind === "adr" && <div style={styles.resultBox}>
      <div style={{ fontWeight: 700, color: "#14532d", fontSize: 16, marginBottom: 8, textTransform: "capitalize" }}>{drug}</div>

      <div><strong>Common:</strong><ul style={{ margin: "4px 0" }}>{result.common.map((s, i) => <li key={i} style={{ fontSize: 13.5 }}>{s}</li>)}</ul></div>
      <div><strong style={{ color: "#166534" }}>Monitor:</strong> {result.monitor.join(", ")}</div>
    </div>}
    {searched && result && kind === "brands" && <div style={styles.resultBox}>
      <div style={{ fontWeight: 700, color: "#14532d", fontSize: 16, marginBottom: 8, textTransform: "capitalize" }}>{drug}</div>
      <div style={{ marginBottom: 8 }}><strong>Dosage forms:</strong><ul style={{ margin: "4px 0" }}>{result.forms.map((f, i) => <li key={i} style={{ fontSize: 13.5 }}>{f}</li>)}</ul></div>
      <div style={{ marginBottom: 8 }}><strong>🇵🇰 Pakistani brands:</strong> {result.pk.join(", ")}</div>

    {tab === "drip" && <div><NumField label="Volume" unit="mL" value={vol} onChange={setVol} /><NumField label="Time" unit="hours" value={hrs} onChange={setHrs} /><div style={{ marginBottom: 12 }}><label style={styles.label}>Drop factor (gtt/mL)</label><select value={dropF} onChange={(e) => setDropF(e.target.value)} style={styles.input}><option value="10">10</option><option value="15">15</option><option value="20">20</option><option value="60">60 micro</option></select></div>{mlhr && <div style={styles.resultBox}><ResultLine label="Rate" value={`${mlhr.toFixed(1)} mL/hr`} /><ResultLine label="Drip rate" value={`${gtt.toFixed(0)} gtt/min`} /></div>}</div>}
    <Disclaimer />{any && <EndBackButton onBack={onBack} />}
  </div>;
}

const LABS = [
  { name: "Hemoglobin (Male)", unit: "g/dL", low: 13.5, high: 17.5, vhigh: 20 }, { name: "Hemoglobin (Female)", unit: "g/dL", low: 12, high: 15.5, vhigh: 18 },
  { name: "WBC Count", unit: "×10⁹/L", low: 4, high: 11, vhigh: 30 }, { name: "Platelets", unit: "×10⁹/L", low: 150, high: 450, vhigh: 1000 },
  { name: "Sodium", unit: "mEq/L", low: 135, high: 145, vhigh: 155 }, { name: "Potassium", unit: "mEq/L", low: 3.5, high: 5.1, vhigh: 6 },
  { name: "BUN", unit: "mg/dL", low: 7, high: 20, vhigh: 60 }, { name: "Creatinine (M)", unit: "mg/dL", low: 0.7, high: 1.3, vhigh: 3 },
  { name: "Fasting Glucose", unit: "mg/dL", low: 70, high: 99, vhigh: 126 }, { name: "HbA1c", unit: "%", low: 4, high: 5.6, vhigh: 6.5 },
  { name: "ALT", unit: "U/L", low: 7, high: 56, vhigh: 168 }, { name: "AST", unit: "U/L", low: 10, high: 40, vhigh: 120 },
  { name: "Total Bilirubin", unit: "mg/dL", low: 0.1, high: 1.2, vhigh: 3 }, { name: "Total Cholesterol", unit: "mg/dL", low: 120, high: 199, vhigh: 240 },
  { name: "LDL", unit: "mg/dL", low: 40, high: 99, vhigh: 160 }, { name: "Triglycerides", unit: "mg/dL", low: 40, high: 149, vhigh: 500 },
  { name: "TSH", unit: "mIU/L", low: 0.4, high: 4, vhigh: 10 }, { name: "Calcium", unit: "mg/dL", low: 8.5, high: 10.5, vhigh: 13 },
  { name: "INR", unit: "", low: 0.8, high: 1.2, vhigh: 4.5 }, { name: "CRP", unit: "mg/dL", low: 0, high: 1, vhigh: 10 },
];
function LabModule({ onBack }) {
  const [i, setI] = useState(""); const [val, setVal] = useState("");
  const lab = i !== "" ? LABS[+i] : null; const v = parseFloat(val);
  let st = null;
  if (lab && !isNaN(v)) {
    if (v < lab.low) st = { l: "LOW", c: "#1d4ed8", bg: "#dbeafe", b: "#3b82f6", blink: false, ic: "🔵" };
    else if (v <= lab.high) st = { l: "OPTIMAL", c: "#166534", bg: "#dcfce7", b: "#16a34a", blink: false, ic: "✅" };
    else if (v < lab.vhigh) st = { l: "HIGH", c: "#c2410c", bg: "#ffedd5", b: "#f97316", blink: false, ic: "🟠" };
    else st = { l: "VERY HIGH", c: "#b91c1c", bg: "#fee2e2", b: "#dc2626", blink: true, ic: "🚨" };
  }
  return <div style={styles.card}><OfflineBadge />
    <div style={{ marginBottom: 14 }}><label style={styles.label}>Laboratory test</label><select value={i} onChange={(e) => setI(e.target.value)} style={styles.input}><option value="">— Select —</option>{LABS.map((l, idx) => <option key={l.name} value={idx}>{l.name}{l.unit ? ` (${l.unit})` : ""}</option>)}</select></div>
    {lab && <div style={{ fontSize: 12.5, color: "#6b7280", marginBottom: 12, background: "#f9fafb", borderRadius: 8, padding: "8px 12px" }}>Reference: <strong style={{ color: "#14532d" }}>{lab.low} – {lab.high} {lab.unit}</strong></div>}
    <div style={{ marginBottom: 14 }}><label style={styles.label}>Patient result</label><input type="number" value={val} onChange={(e) => setVal(e.target.value)} style={styles.input} placeholder="Enter value" /></div>
    {st && <div style={{ ...styles.resultBox, background: st.bg, border: `2px solid ${st.b}`, textAlign: "center", animation: st.blink ? "blink 1s infinite" : "none" }}>
      <div style={{ fontSize: 30 }}>{st.ic}</div><div style={{ fontSize: 22, fontWeight: 800, color: st.c, letterSpacing: 1 }}>{st.l}</div>
      <div style={{ fontSize: 13, color: st.c, marginTop: 4 }}>{lab.name}: <strong>{v} {lab.unit}</strong> (ref {lab.low}–{lab.high})</div>
      {st.l === "VERY HIGH" && <div style={{ fontSize: 12.5, fontWeight: 700, color: "#b91c1c", marginTop: 6 }}>⚠️ Critical range — urgent review.</div>}
    </div>}
    <div style={{ fontSize: 11.5, color: "#6b7280", marginTop: 14 }}>ℹ️ Prefer the performing lab's own validated ranges.</div>
    <Disclaimer />{st && <EndBackButton onBack={onBack} />}
  </div>;
}

const RESOURCES = [["DRAP", "https://www.dra.gov.pk"], ["DRAP ADR Reporting", "https://www.dra.gov.pk/pharmacovigilance/"], ["Registered Drugs Database", "https://www.dra.gov.pk/registration-of-drugs/"], ["Pakistan National Formulary", "https://www.dra.gov.pk/national-formulary/"], ["WHO Essential Medicines", "https://www.who.int/groups/expert-committee-on-selection-and-use-of-essential-medicines/essential-medicines-lists"], ["FDA Drugs", "https://www.fda.gov/drugs"], ["DailyMed", "https://dailymed.nlm.nih.gov"], ["CDC Medication Safety", "https://www.cdc.gov/medication-safety/"], ["ADA Standards of Care", "https://diabetesjournals.org/care/issue"], ["Drugs.com Interactions", "https://www.drugs.com/drug_interactions.html"], ["Medscape", "https://reference.medscape.com/drugs"], ["PubMed", "https://pubmed.ncbi.nlm.nih.gov"]];
function Resources() {
  return <div style={styles.card}><OfflineBadge /><div style={{ display: "grid", gap: 10 }}>{RESOURCES.map(([n, u]) => <a key={u} href={u} target="_blank" rel="noopener noreferrer" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "13px 16px", borderRadius: 10, border: "1px solid #e5e7eb", textDecoration: "none", background: "#fafafa", color: "#14532d", fontWeight: 600, fontSize: 13.5 }}><span>🔗 {n}</span><span style={{ color: "#16a34a" }}>→</span></a>)}</div></div>;
}

// ================= IV COMPAT (built-in common pairs) =================
const IV_DB = [
  { a: "ceftriaxone", b: "calcium", res: "INCOMPATIBLE", note: "Precipitates — contraindicated together, especially in neonates. Never co-administer." },
  { a: "ceftriaxone", b: "ringer", res: "INCOMPATIBLE", note: "Ringer's lactate contains calcium — avoid as diluent/same line." },
  { a: "vancomycin", b: "ceftriaxone", res: "INCOMPATIBLE", note: "Precipitation reported — flush line between or use separate lines." },
  { a: "vancomycin", b: "heparin", res: "INCOMPATIBLE", note: "Precipitates — do not mix; flush between." },
  { a: "furosemide", b: "midazolam", res: "INCOMPATIBLE", note: "Precipitation — avoid Y-site." },
  { a: "potassium", b: "normal saline", res: "COMPATIBLE", note: "KCl is routinely diluted in NS — infuse at controlled rate." },
  { a: "insulin", b: "normal saline", res: "COMPATIBLE", note: "Regular insulin compatible with NS; adsorbs to tubing — prime line." },
];
function IVModule({ onBack }) {
  const [a, setA] = useState(""); const [b, setB] = useState(""); const [res, setRes] = useState(null); const [searched, setSearched] = useState(false);
  const check = () => {
    if (!a.trim() || !b.trim()) return;
    setSearched(true);
    const ta = tokens(a), tb = tokens(b);
    const hit = IV_DB.find((r) => (ta.some((t) => t.startsWith(r.a)) && tb.some((t) => t.startsWith(r.b))) || (ta.some((t) => t.startsWith(r.b)) && tb.some((t) => t.startsWith(r.a))));
    setRes(hit || null);
  };
  return <div style={styles.card}><OfflineBadge />
    <DrugField label="Drug 1" value={a} onChange={(v) => { setA(v); setSearched(false); }} placeholder="e.g., ceftriaxone" />
    <DrugField label="Drug 2 / diluent" value={b} onChange={(v) => { setB(v); setSearched(false); }} placeholder="e.g., calcium" />
    <button style={styles.btn} onClick={check}>🔍 Check Compatibility</button>
    {searched && res && <div style={{ ...styles.resultBox, background: res.res === "COMPATIBLE" ? "#dcfce7" : "#fee2e2", border: `2px solid ${res.res === "COMPATIBLE" ? "#16a34a" : "#dc2626"}` }}>
      <div style={{ fontSize: 20, fontWeight: 800, color: res.res === "COMPATIBLE" ? "#166534" : "#b91c1c" }}>{res.res === "COMPATIBLE" ? "✅ COMPATIBLE" : "⛔ INCOMPATIBLE"}</div>
      <div style={{ fontSize: 13.5, marginTop: 6 }}>{res.note}</div>
    </div>}
    {searched && !res && <div style={{ ...styles.resultBox, background: "#fff7ed", border: "1px solid #fed7aa", fontSize: 13.5 }}>No data for this pair in the built-in database. When compatibility is unknown, use <strong>separate lines</strong> and consult Trissel's / King Guide.</div>}
    <Disclaimer />{searched && <EndBackButton onBack={onBack} />}
  </div>;
}

    </div>

      <MortarPestle size={72} /><h1 style={{ color: "#14532d", fontSize: 26, margin: "14px 0 4px", fontFamily: "Georgia, serif" }}>Apothecary Pro</h1>
      <p style={{ color: "#6b7280", fontSize: 13, marginTop: 0, marginBottom: 26 }}>Clinical Pharmacy Suite · Professional Access</p>

  if (page) {

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "34px 22px 40px", position: "relative" }}>
        <h2 style={{ color: "#fff", fontSize: 23, margin: 0, fontFamily: "Georgia, serif" }}>Welcome, Syed Ghulam Aves Shah, R.Ph.</h2>
        <p style={{ color: "#bbf7d0", fontSize: 13.5, margin: "8px 0 0", maxWidth: 580, lineHeight: 1.6 }}>Every tool works instantly — no API key, no cost. Built-in reference data covers common medicines; add an optional key to extend AI coverage to any drug.</p>
      </div>
    </div>
    <div style={{ maxWidth: 900, margin: "0 auto", padding: "30px 22px 60px", position: "relative" }}>
      <div style={{ position: "fixed", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none", zIndex: 0, opacity: 0.04 }}><MortarPestle size={460} /></div>
      <div style={{ position: "relative", zIndex: 1 }}>
